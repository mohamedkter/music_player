name: music_player
description: "A professional local music player built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # ── Audio Engine ──────────────────────────────────────
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  on_audio_query: ^2.9.0

  # ── Permissions ───────────────────────────────────────
  permission_handler: ^11.3.1

  # ── State Management (BLoC) ───────────────────────────
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # ── Database ──────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # ── UI & Design ───────────────────────────────────────
  palette_generator: ^0.3.3+3
  cached_network_image: ^3.3.1
  animations: ^2.0.11
  google_fonts: ^6.2.1
  lottie: ^3.1.2

  # ── Utils ─────────────────────────────────────────────
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  rxdart: ^0.27.7
  get_it: ^8.0.3
  injectable: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.12
  injectable_generator: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk-Regular.ttf
        - asset: assets/fonts/HankenGrotesk-Medium.ttf
          weight: 500
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

